name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile and import check
        run: |
          python -m compileall app.py dashboard_app.py ai parser planner data
          python - <<'PY'
from importlib import import_module
for mod in [
    'ai.engine',
    'parser.syllabus_parser',
    'planner.weekly_planner',
]:
    import_module(mod)
print('ok: imports')
PY

      - name: Secret scan
        run: |
          python - <<'PY'
          import re
          import pathlib
          import sys

          ROOT = pathlib.Path(".")
          patterns = [
              re.compile(r"(?i)(?:apikey|api[_-]?key|secret[_-]?key|access[_-]?token)\s*[:=]\s*['\"][A-Za-z0-9._-]{16,}['\"]"),
              re.compile(r"(?i)AKIA[0-9A-Z]{16}"),
              re.compile(r"(?i)gh[pousr]_[A-Za-z0-9]{20,}"),
              re.compile(r"sk-[A-Za-z0-9]{20,}"),
              re.compile(r"AIza[0-9A-Za-z_-]{35}"),
          ]

          skip_dirs = {".git", ".venv", "venv", "node_modules", ".mypy_cache", ".pytest_cache"}
          issues = []

          for path in ROOT.rglob("*"):
              if not path.is_file():
                  continue
              if any(part in skip_dirs for part in path.parts):
                  continue
              if path.suffix.lower() in {".png", ".jpg", ".jpeg", ".gif", ".svg", ".bin", ".pyc", ".so"}:
                  continue
              try:
                  text = path.read_text(encoding="utf-8", errors="ignore")
              except Exception:
                  continue
              for idx, line in enumerate(text.splitlines(), start=1):
                  if any(pattern.search(line) for pattern in patterns):
                      issues.append(f"{path}:{idx}: {line.strip()[:160]}")

          if issues:
              print("Potential secrets detected:")
              for item in issues:
                  print(item)
              sys.exit(1)

          print("No obvious hardcoded secrets detected.")
          PY
